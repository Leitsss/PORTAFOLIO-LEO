<!DOCTYPE html>
<html>

<head>

<title>Leonel Cepeda Portfolio</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
color:white;
font-family:Courier New;
overflow-x:hidden;
background:black;
}

/* FONDO GALAXIA */

.space{

position:fixed;
width:100%;
height:100%;
z-index:-1;

background-image:url("https://usagif.com/wp-content/uploads/gif/outerspace-15.gif");

background-size:cover;

}


/* LOADING */

.loader{

position:fixed;

width:100%;

height:100%;

background:black;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

z-index:10;

}


.bolt{

font-size:60px;

animation:blink 1s infinite;

}

@keyframes blink{

0%{opacity:0.2;}

50%{opacity:1;}

100%{opacity:0.2;}

}



/* INTRO TEXTO */

.intro{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

font-size:28px;

}


/* SECCION */

.section{

width:70%;

margin:auto;

margin-top:100px;

text-align:center;

}

/* VIDEO */

iframe{

width:100%;

height:500px;

border:none;

border-radius:10px;

}

img{

width:60%;

border-radius:10px;

margin-top:20px;

}

</style>

</head>



<body>



<div class="space"></div>



<div class="loader" id="loader">

<div class="bolt">⚡</div>

<p>Cargando...</p>

</div>



<div id="content" style="display:none">



<div class="intro">

<div id="typing"></div>

</div>




<div class="section">

<h1>REVELACIÓN</h1>

<p>

Director de Arte

</p>


<p>

Cortometraje con premios internacionales

</p>


<p>

Mejor Guión

Festival Internacional de Cine Fin del Mundo Ushuaia 2025

</p>

<p>

Best Debut Short Film

Kollywood 2025

</p>


<img src="AQUIVAIMAGEN.jpg">


<br><br>


<iframe

src="AQUIVAIVIDEO">

</iframe>


</div>



</div>




<script>



setTimeout(function(){

document.getElementById("loader").style.display="none";

document.getElementById("content").style.display="block";

startTyping();

},3000);



var text="Bienvenido a mi portafolio, buen viaje astronauta...";

var i=0;



function startTyping(){

var audio = new Audio("https://www.soundjay.com/mechanical/typewriter-1.mp3");

var speed=60;



function typeWriter(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

audio.play();

i++;

setTimeout(typeWriter,speed);

}

}



typeWriter();



}



</script>



</body>

</html>
